global:
  # e.g.
  # imagePullSecrets:
  #   - my-registry-secrets
  #   - other-registry-secrets
  # -- Global Docker registry secret names as an array
  imagePullSecrets: []

api7ee:
  # -- Interval in seconds at which the gateway reports upstream healthcheck data to the control plane
  healthcheck_report_interval: 120

  # -- Interval in seconds at which raw API call data (used by the API usage feature) is uploaded to the control plane
  raw_api_calls_upload_interval: 3600

  # -- HTTP timeout used while sending healthcheck and telemetry data to the control plane
  http_timeout: 30s

  status_endpoint:
    # -- When enabled, APISIX will provide `/status` and `/status/ready` endpoints, /status endpoint will return 200 status code if APISIX has successfully started and running correctly, /status/ready endpoint will return 503 status code if none of the configured etcd (dp_manager) are available.
    enabled: false
    # -- The IP address and port on which the status endpoint will listen.
    ip: 0.0.0.0
    # -- The port on which the status endpoint will listen.
    port: 7085

  # -- A global switch for healthcheck. Defaults to false. When set to true, it overrides all upstream healthcheck configurations and globally disabling healthchecks.
  disable_upstream_healthcheck: false

apisix:
  # -- Enable or disable API7 Gateway itself
  enabled: true

  # -- Enable nginx IPv6 resolver
  enableIPv6: true

  # -- Whether the APISIX version number should be shown in Server header
  enableServerTokens: true

  # -- When true, the upstream status is always written to the `X-APISIX-Upstream-Status` response header; when false, it is written only for 5xx responses
  showUpstreamStatusInResponseHeader: false

  # -- List of IPs/CIDRs from which the gateway trusts the `X-Forwarded-*` headers passed in requests.
  # CAUTION: when not configured, or when the request comes from an untrusted address, the gateway
  # overrides `X-Forwarded-Proto/Host/Port` with trusted values and clears the `Forwarded` header.
  # For `X-Forwarded-For`: when this list is configured and the request comes from an untrusted address,
  # the header is reset so the upstream only sees the connection IP observed by the gateway; when not
  # configured, it is preserved and the connection IP is appended (compatible default).
  trustedAddresses: []
    # - 127.0.0.1
    # - 172.18.0.0/16

  # -- Cap (in MB) on the request body read when matching `post_arg.*` route predicates
  # for JSON and multipart requests. Set to 0 to disable the limit.
  maxPostArgsReadableSize: 64

  # -- PROXY Protocol configuration.
  proxyProtocol:
    # -- (int) The HTTP port that accepts the PROXY Protocol. It differs from `gateway.http` ports and `admin` port:
    # this port only accepts HTTP requests carrying the PROXY Protocol, while the other ports only accept plain HTTP
    # requests. If you enable the PROXY Protocol, you must use this port to receive HTTP requests with it.
    # When set, the port is also exposed on the gateway Service.
    listenHttpPort:
    # -- (int) The nodePort of the PROXY Protocol HTTP port, only used if gateway.type is NodePort.
    # If not set, a random port will be assigned by Kubernetes.
    listenHttpNodePort:
    # -- (int) The HTTPS port that accepts the PROXY Protocol.
    # When set, the port is also exposed on the gateway Service.
    listenHttpsPort:
    # -- (int) The nodePort of the PROXY Protocol HTTPS port, only used if gateway.type is NodePort.
    # If not set, a random port will be assigned by Kubernetes.
    listenHttpsNodePort:
    # -- Accept the PROXY Protocol on every gateway.stream.tcp port. Acts as the default;
    # override per port with the `proxy_protocol` field on a gateway.stream.tcp entry.
    enableTcpPP: false
    # -- Send the PROXY Protocol to the upstream server on every gateway.stream.tcp port. Acts as the default;
    # override per port with the `proxy_protocol_to_upstream` field on a gateway.stream.tcp entry.
    enableTcpPPToUpstream: false

  # -- Use Pod metadata.uid as the APISIX id.
  setIDFromPodUID: false

  # -- Proxy caching configuration used by the proxy-cache plugin.
  proxyCache:
    # -- The default caching time in disk if the upstream does not specify the cache time
    cacheTtl: 10s
    # -- The parameters of a cache. The `memory_size` field stores the cache index for the
    # disk strategy and the cache content for the memory strategy; `disk_size`, `disk_path`
    # and `cache_levels` only apply to the disk strategy.
    zones:
      - name: disk_cache_one
        memory_size: 50m
        disk_size: 1G
        disk_path: "/tmp/disk_cache_one"
        cache_levels: "1:2"
      - name: memory_cache
        memory_size: 50m

  meta:
    # -- Shared dict settings for the `meta` context (used by both HTTP and stream subsystems)
    luaSharedDict:
      prometheus-metrics: 256m

  stream:
    # -- Shared dict settings for the stream (L4 proxy) subsystem
    luaSharedDict:
      etcd-cluster-health-check-stream: 10m
      lrucache-lock-stream: 10m
      plugin-limit-conn-stream: 10m
      worker-events-stream: 10m
      tars-stream: 1m
      config-stream: 5m
      nacos-stream: 64m

  http:
    # -- Shared dict settings for the HTTP subsystem
    luaSharedDict:
      internal-status: 10m
      plugin-limit-req: 10m
      plugin-limit-count: 10m
      plugin-limit-conn: 10m
      plugin-limit-conn-redis-cluster-slot-lock: 1m
      plugin-graphql-limit-count: 10m
      plugin-graphql-limit-count-reset-header: 10m
      plugin-ai-rate-limiting: 10m
      plugin-ai-rate-limiting-reset-header: 10m
      upstream-healthcheck: 10m
      worker-events: 10m
      lrucache-lock: 10m
      balancer-ewma: 10m
      balancer-ewma-locks: 10m
      balancer-ewma-last-touched-at: 10m
      plugin-limit-req-redis-cluster-slot-lock: 1m
      plugin-limit-count-redis-cluster-slot-lock: 1m
      plugin-limit-count-advanced: 10m
      plugin-limit-count-advanced-redis-cluster-slot-lock: 1m
      tracing_buffer: 32m
      plugin-api-breaker: 10m
      etcd-cluster-health-check: 10m
      discovery: 1m
      jwks: 1m
      introspection: 10m
      access-tokens: 1m
      tars: 1m
      cas-auth: 10m
      status_report: 1m
      api-calls-for-portal: 64m

  # -- fine tune the parameters of LRU cache for some features like secret
  lru:
    secret:
      # -- TTL in seconds for cached secret values
      ttl: 300
      # -- Maximum number of cached secret values
      count: 512
      # -- TTL in seconds for cached negative (failed lookup) results
      neg_ttl: 60
      # -- Maximum number of cached negative (failed lookup) results
      neg_count: 512

  # -- Enable comprehensive request lifecycle tracing (SSL/SNI, rewrite, access, header_filter, body_filter, and log).
  # When disabled, OpenTelemetry collects only a single span per request.
  tracing: false

  # -- Add custom [lua_shared_dict](https://github.com/openresty/lua-nginx-module#toc88) settings,
  # click [here](https://github.com/apache/apisix-helm-chart/blob/master/charts/apisix/values.yaml#L27-L30) to learn the format of a shared dict
  customLuaSharedDicts:
    - name: kubernetes
      size: 64m
    - name: nacos
      size: 64m
    - name: consul
      size: 64m
    # - name: foo
    #   size: 10k

  # -- Extend lua_package_path to load third party Lua code
  extraLuaPath: ""
  # -- Extend lua_package_cpath to load third party Lua C libraries
  extraLuaCPath: ""

  # -- Delete the '/' at the end of the URI
  deleteURITailSlash: false
  # -- The URI normalization in servlet is a little different from the RFC's.
  # See https://github.com/jakartaee/servlet/blob/master/spec/src/main/asciidoc/servlet-spec-body.adoc#352-uri-path-canonicalization,
  # which is used under Tomcat.
  # Turn this option on if you want to be compatible with servlet when matching URI path.
  normalizeURILikeServlet: false
  # -- Defines how apisix handles routing:
  # - radixtree_uri: match route by uri(base on radixtree)
  # - radixtree_host_uri: match route by host + uri(base on radixtree)
  # - radixtree_uri_with_parameter: match route by uri with parameters
  httpRouter: radixtree_host_uri

  # -- Enable full customized config.yaml
  enableCustomizedConfig: false
  # -- If apisix.enableCustomizedConfig is true, full customized config.yaml.
  # Please note that other settings about APISIX config will be ignored
  customizedConfig: {}

  image:
    # -- API7 Gateway image repository
    repository: api7/api7-ee-3-gateway
    # -- API7 Gateway image pull policy
    pullPolicy: Always
    # -- API7 Gateway image tag
    # Overrides the image tag whose default is the chart appVersion.
    tag: 3.10.2

  # -- Use a `DaemonSet` or `Deployment`
  kind: Deployment
  # -- kind is DaemonSet, replicaCount not become effective
  replicaCount: 1

  # -- termination grace period for API7 Gateway pods
  terminationGracePeriodSeconds: 30

  # -- Set [priorityClassName](https://kubernetes.io/docs/concepts/scheduling-eviction/pod-priority-preemption/#pod-priority) for API7 Gateway pods
  priorityClassName: ""
  # -- Annotations to add to each pod
  podAnnotations: {}
  # -- Labels to add to each pod
  podLabels: {}
  # -- Set the securityContext for API7 Gateway pods
  podSecurityContext: {}
    # fsGroup: 2000
  # -- Set the securityContext for API7 Gateway container
  securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000

  # -- See https://kubernetes.io/docs/tasks/run-application/configure-pdb/ for more details
  podDisruptionBudget:
    # -- Enable or disable podDisruptionBudget
    enabled: false
    # -- Set the `minAvailable` of podDisruptionBudget. You can specify only one of `maxUnavailable` and `minAvailable` in a single PodDisruptionBudget.
    # See [Specifying a Disruption Budget for your Application](https://kubernetes.io/docs/tasks/run-application/configure-pdb/#specifying-a-poddisruptionbudget)
    # for more details
    minAvailable: 90%
    # -- Set the maxUnavailable of podDisruptionBudget
    maxUnavailable: 1

  # -- Topology Spread Constraints for pod assignment
  # https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/
  # The value is evaluated as a template
  topologySpreadConstraints: []

  # -- Set pod resource requests & limits
  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  # -- Use the host's network namespace
  hostNetwork: false

  # -- Custom DNS settings for the APISIX pods
  dnsConfig: {}

  # -- Node labels for API7 Gateway pod assignment
  nodeSelector: {}
  # -- List of node taints to tolerate
  tolerations: []
  # -- Set affinity for API7 Gateway deploy
  affinity: {}

  # -- timezone is the timezone where apisix uses.
  # For example: "UTC" or "Asia/Shanghai"
  # This value will be set on apisix container's environment variable TZ.
  # You may need to set the timezone to be consistent with your local time zone,
  # otherwise the apisix's logs may used to retrieve event maybe in wrong timezone.
  timezone: ""

  # -- extraEnvVars An array to add extra env vars
  # e.g:
  # extraEnvVars:
  #   - name: FOO
  #     value: "bar"
  #   - name: FOO2
  #     valueFrom:
  #       secretKeyRef:
  #         name: SECRET_NAME
  #         key: KEY
  extraEnvVars: []
  # -- Name of existing ConfigMap containing extra env vars
  extraEnvVarsCM: ""
  # -- Name of existing Secret containing extra env vars
  extraEnvVarsSecret: ""

# -- String to partially override the chart fullname
nameOverride: ""
# -- String to fully override the chart fullname
fullnameOverride: ""

serviceAccount:
  # -- Whether a ServiceAccount should be created for the gateway pods
  create: false
  # -- Annotations to add to the ServiceAccount
  annotations: {}
  # -- Name of the ServiceAccount to use. If not set and create is true, a name is generated from the chart fullname
  name: ""

rbac:
  # -- Whether RBAC resources (ClusterRole and ClusterRoleBinding) should be created
  create: false

deployment:
  # -- use cloud storage as the fallback control plane
  fallback_cp: {}
  #  # Allowed values: `write`, `read`, default `read`
  #  mode: "write"
  #  # how often (in seconds) to sync data to cloud storage, only used when mode is `write`
  #  interval: 10
  #  # aws s3 configuration, when access key or secret key are not set, will use the IAM role attached to the pod
  #  aws_s3:
  #    access_key: "access"
  #    secret_key: "secret"
  #    region: "ap-south-1"
  #    resource_bucket: "to-push-resource-data"
  #    config_bucket: "to-push-config-data"
  #    # optional, set to use an S3-compatible endpoint (e.g., MinIO, Ceph, Aliyun OSS)
  #    endpoint: ""
  #    use_path_style: true
  #  # azure blob storage configuration, when account key is not set, will use the Managed Identity attached to the pod
  #  azure_blob:
  #    account_name: "$YOUR_ACCOUNT_NAME"
  #    account_key: "$YOUR_ACCOUNT_KEY"
  #    resource_container: yaml
  #    config_container: config
  #    # optional, when not set, will use the default endpoint: "https://$YOUR_ACCOUNT_NAME.blob.core.windows.net"
  #    endpoint: "$YOUR_AZURE_BLOB_ENDPOINT"

  # -- certs used for certificates in decoupled mode
  certs:
    # -- secret name used for decoupled mode
    certsSecret: ""
    # -- cert name in certsSecret
    cert: ""
    # -- cert key in certsSecret
    cert_key: ""

    # -- trusted_ca_cert name in certsSecret
    mTLSCACertSecret: ""
    # -- mTLS CA cert filename in mTLSCACertSecret
    mTLSCACert: ""

gateway:
  # -- API7 Gateway service type for user access itself
  type: NodePort
  # -- Setting how the Service route external traffic.
  # If you want to keep the client source IP, you can set this to Local,
  # ref: https://kubernetes.io/docs/tasks/access-application-cluster/create-external-load-balancer/#preserving-the-client-source-ip
  externalTrafficPolicy: Cluster
  # type: LoadBalancer
  # loadBalancerClass: "my-loadbalancer-class"
  # loadBalancerIP: a.b.c.d
  # loadBalancerSourceRanges:
  #   - "143.231.0.0/16"
  # -- IPs for which nodes in the cluster will also accept traffic for the servic
  # annotations:
  #   service.beta.kubernetes.io/aws-load-balancer-type: nlb
  externalIPs: []
  # -- kubernetes readiness probe, we will provide a probe based on tcpSocket to gateway's HTTP port by default.
  readinessProbe: {}
  # -- kubernetes liveness probe.
  livenessProbe: {}
  # -- API7 Gateway service settings for http
  http:
    # -- Enable plain HTTP listeners
    enabled: true
    # -- which ip to listen on for API7 Gateway http service.
    ip: 0.0.0.0
    # -- Kubernetes service port for HTTP traffic
    servicePort: 80
    # -- Container port the gateway listens on for HTTP traffic
    containerPort: 9080
    # -- (int) The nodePort of kubernetes service, only used if gateway.type is NodePort. If not set, a random port will be assigned by Kubernetes.
    nodePort:
    # hostPort: 9080
    # backlog: 1024  # sets the backlog parameter in the listen() call that limits, the maximum length for the queue of pending connections. By default, backlog is set to -1 on FreeBSD, DragonFly BSD, and macOS, and to 511 on other platforms.
    # -- Support multiple http ports, See [Configuration](https://github.com/apache/apisix/blob/0bc65ea9acd726f79f80ae0abd8f50b7eb172e3d/conf/config-default.yaml#L24)
    additionalContainerPorts: []
      # - port: 9081
      #   hostPort: 9081
      #   nodePort: 31081
      #   enable_http2: true          # If not set, the default value is `false`.
      #   backlog: 1024
      # - ip: 127.0.0.2               # Specific IP, If not set, the default value is `0.0.0.0`.
      #   port: 9082
      #   hostPort: 9082
      #   enable_http2: true
      #   backlog: 1024
  # -- API7 Gateway service settings for tls
  tls:
    # -- Enable HTTPS listeners
    enabled: true
    # -- which ip to listen on for API7 Gateway https service.
    ip: 0.0.0.0
    # -- Kubernetes service port for HTTPS traffic
    servicePort: 443
    # -- Container port the gateway listens on for HTTPS traffic
    containerPort: 9443
    # -- (int) The nodePort of kubernetes service, only used if gateway.type is NodePort. If not set, a random port will be assigned by Kubernetes.
    nodePort:
    # hostPort: 9443
    # backlog: 1024
    # -- Support multiple https ports, See [Configuration](https://github.com/apache/apisix/blob/0bc65ea9acd726f79f80ae0abd8f50b7eb172e3d/conf/config-default.yaml#L99)
    additionalContainerPorts: []
      # - ip: 127.0.0.3           # Specific IP, If not set, the default value is `0.0.0.0`.
      #   port: 9445
      #   hostPort: 9445
      #   nodePort: 31045
      #   enable_http2: true
      #   backlog: 1024
    # -- Specifies the name of Secret contains trusted CA certificates in the PEM format used to verify the certificate when APISIX needs to do SSL/TLS handshaking with external services (e.g. etcd)
    existingCASecret: ""
    # -- Filename be used in the gateway.tls.existingCASecret
    certCAFilename: ""
    http2:
      # -- Enable HTTP/2 on the HTTPS listeners
      enabled: true
    # -- TLS protocols allowed to use.
    sslProtocols: "TLSv1.2 TLSv1.3"
    # -- TLS cipher suites allowed to use, in OpenSSL cipher list format
    sslCiphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256:ECDHE-ECDSA-AES128-SHA:ECDHE-RSA-AES128-SHA:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES256-SHA:ECDHE-RSA-AES256-SHA:DHE-RSA-AES128-SHA256:DHE-RSA-AES256-SHA256:AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-SHA256:AES256-SHA256:AES128-SHA:AES256-SHA:DES-CBC3-SHA"
    # -- Enable or disable TLS session tickets. Disabled by default because session tickets
    # defeat Perfect Forward Secrecy (see https://github.com/mozilla/server-side-tls/issues/135)
    sslSessionTickets: false
    # -- If set this, when the client doesn't send SNI during handshake, the fallback SNI will be used instead
    fallbackSNI: ""
  # -- API7 Gateway service settings for stream. L4 proxy (TCP/UDP)
  stream:
    # -- Enable the stream (L4 proxy) subsystem
    enabled: false
    # -- Use the stream proxy only, without enabling the HTTP subsystem
    only: false
    # -- Whether to set nodePort to the same value as the TCP/UDP port when gateway.type is NodePort, make sure the nodePort to be in the valid NodePort range of kubernetes service.
    autoAssignNodePort: false
    tcp: []
      # - addr: 192.168.31.10:5432
      # - addr: 3302
      #   nodePort: 31302
      # - "2000-2100"                   # port range (nginx native support)
      # - addr: "3000-3100"             # port range in table form
      # - addr: "127.0.0.1:4000-4100"   # address with port range
      #   tls: true
      # - addr: 9100                        # per-port PROXY protocol overrides for this entry
      #   proxy_protocol: true              # accept the PROXY protocol on this port only
      #   proxy_protocol_to_upstream: true  # send the PROXY protocol to the upstream on this port only;
      #                                     # both override the global apisix.proxyProtocol.enableTcpPP* defaults
    udp: []
      # - addr: 192.168.31.10:53
      # - addr: 5353
      #   nodePort: 31353
      # - "9300-9310"                   # port range
  # -- Using ingress access API7 Gateway service
  ingress:
    # -- Enable an Ingress resource in front of the gateway service
    enabled: false
    # -- Ingress annotations
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    # -- Ingress host and path rules
    hosts:
      - host: apisix.local
        paths: []
    # -- Ingress TLS settings
    tls: []
  #  - secretName: apisix-tls
  #    hosts:
  #      - chart-example.local
  # -- Override default labels assigned to API7 Gateway gateway resources
  labelsOverride: {}
  # labelsOverride:
  #   app.kubernetes.io/name: "{{ .Release.Name }}"
  #   app.kubernetes.io/instance: '{{ include "apisix.name" . }}'
admin:
  # -- Enable Admin API
  enabled: false
  # -- admin service type
  type: ClusterIP
  # loadBalancerClass: "my-loadbalancer-class"
  # loadBalancerIP: a.b.c.d
  # loadBalancerSourceRanges:
  #   - "143.231.0.0/16"
  # -- IPs for which nodes in the cluster will also accept traffic for the servic
  externalIPs: []
  # -- which ip to listen on for API7 Gateway admin API. Set to `"[::]"` when on IPv6 single stack
  ip: 0.0.0.0
  # -- which port to use for API7 Gateway admin API
  port: 9180
  # -- Service port to use for API7 Gateway admin API
  servicePort: 9180
  # -- Admin API support CORS response headers
  cors: true
  # -- Admin API credentials
  credentials:
    # -- API7 Gateway admin API admin role credentials
    admin: edd1c9f034335f136f87ad84b625c8f1
    # -- API7 Gateway admin API viewer role credentials
    viewer: 4054f7cf07e344346cd3f287985e76a2

    # -- The APISIX Helm chart supports storing user credentials in a secret.
    # The secret needs to contain two keys, admin and viewer, with their respective values set.
    secretName: ""

  allow:
    # -- The client IP CIDR allowed to access API7 Gateway Admin API service.
    ipList:
      - 127.0.0.1/24
  # -- Using ingress access API7 Gateway admin service
  ingress:
    # -- Enable an Ingress resource in front of the Admin API service
    enabled: false
    # -- Ingress annotations
    annotations:
      {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    # -- Ingress host and path rules
    hosts:
      - host: apisix-admin.local
        paths:
          - "/apisix"
    # -- Ingress TLS settings
    tls: []
  #  - secretName: apisix-tls
  #    hosts:
  #      - chart-example.local

nginx:
  # -- The number of files a worker process can open, should be larger than nginx.workerConnections
  workerRlimitNofile: "20480"
  # -- Timeout for a graceful shutdown of worker processes
  workerShutdownTimeout: "240s"
  # -- The maximum number of connections that each worker process can open
  workerConnections: "10620"
  # -- The number of nginx worker processes. `auto` means the number of CPU cores
  workerProcesses: auto
  # -- Bind nginx worker processes to CPUs
  enableCPUAffinity: true
  # -- Maximum number of pending timers. Increase it if you see "too many pending timers" error
  maxPendingTimers: 16384
  # -- Maximum number of running timers. Increase it if you see "lua_max_running_timers are not enough" error
  maxRunningTimers: 4096
  # -- List of environment variable names allowed to be accessed within nginx (rendered as nginx `env` directives)
  envs: []
  # -- Nginx HTTP subsystem configurations
  http:
    # -- timeout during which a keep-alive client connection will stay open on the server side
    keepaliveTimeout: "60s"
    # -- timeout for reading client request header, then 408 (Request Time-out) error is returned to the client
    clientHeaderTimeout: "60s"
    # -- timeout for reading client request body, then 408 (Request Time-out) error is returned to the client
    clientBodyTimeout: "60s"
    # -- timeout for transmitting a response to the client, then the connection is closed
    sendTimeout: "10s"
    # -- The maximum allowed size of the client request body.
    # If exceeded, the 413 (Request Entity Too Large) error is returned to the client.
    # Note that unlike Nginx, we don't limit the body size by default (0 means no limit).
    clientMaxBodySize: 0
    # -- Enable the use of underscores in client request header fields
    underscoresInHeaders: "on"
    # -- The request header used to determine the client's real IP address,
    # see [real_ip_header](http://nginx.org/en/docs/http/ngx_http_realip_module.html#real_ip_header)
    realIpHeader: "X-Real-IP"
    # -- Whether to search for the real IP recursively when the header set in nginx.http.realIpHeader contains multiple addresses,
    # see [real_ip_recursive](http://nginx.org/en/docs/http/ngx_http_realip_module.html#real_ip_recursive)
    realIpRecursive: "off"
    # -- Trusted addresses from which the real IP header is honored,
    # see [set_real_ip_from](http://nginx.org/en/docs/http/ngx_http_realip_module.html#set_real_ip_from)
    realIpFrom:
      - 127.0.0.1
      - "unix:"
    # -- Enables or disables passing of the server name through TLS Server Name Indication extension (SNI, RFC 6066)
    # when establishing a connection with the proxied HTTPS server
    proxySslServerName: true
    # -- Keepalive settings for connections from the gateway to upstream servers
    upstream:
      # -- Maximum number of idle keepalive connections to upstream servers that are preserved in the cache of each worker process.
      # When this number is exceeded, the least recently used connections are closed
      keepalive: 320
      # -- Maximum number of requests that can be served through one keepalive connection.
      # After the maximum number of requests is made, the connection is closed
      keepaliveRequests: 1000
      # -- Timeout during which an idle keepalive connection to an upstream server will stay open
      keepaliveTimeout: 60s
    # -- The charset added to the "Content-Type" response header field,
    # see [charset](http://nginx.org/en/docs/http/ngx_http_charset_module.html#charset)
    charset: utf-8
    # -- The maximum size of the nginx variables hash table
    variablesHashMaxSize: 2048

# -- Set APISIX plugin attributes, see [config-default.yaml](https://github.com/apache/apisix/blob/master/conf/config-default.yaml#L376) for more details
pluginAttrs: {}

graphql:
  # -- The maximum size in bytes of GraphQL queries the gateway parses when matching routes by GraphQL attributes (default 1MiB)
  maxSize: 1048576

# -- Update strategy of the workload (Deployment or DaemonSet), e.g. `type: RollingUpdate`
updateStrategy: {}
  # type: RollingUpdate

# -- Additional `volume`, See [Kubernetes Volumes](https://kubernetes.io/docs/concepts/storage/volumes/) for the detail.
extraVolumes: []
# - name: extras
#   emptyDir: {}

# -- Additional `volumeMounts` for the gateway container, See [Kubernetes Volumes](https://kubernetes.io/docs/concepts/storage/volumes/) for the detail.
extraVolumeMounts: []
# - name: extras
#   mountPath: /usr/share/extras
#   readOnly: true

# -- Additional `initContainers`, See [Kubernetes initContainers](https://kubernetes.io/docs/concepts/workloads/pods/init-containers/) for the detail.
extraInitContainers: []
# - name: init-myservice
#   image: busybox:1.28
#   command: ['sh', '-c', "until nslookup myservice.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for myservice; sleep 2; done"]

discovery:
  # -- Enable or disable API7 Gateway integration service discovery
  enabled: false
  # -- Registry is the same to the one in APISIX [config-default.yaml](https://github.com/apache/apisix/blob/master/conf/config-default.yaml#L281),
  # and refer to such file for more setting details. also refer to [this documentation for integration service discovery](https://apisix.apache.org/docs/apisix/discovery)
  registry: {}
    # Integration service discovery registry. E.g eureka\dns\nacos\consul_kv
    # reference:
    # https://apisix.apache.org/docs/apisix/discovery/#configuration-for-eureka
    # https://apisix.apache.org/docs/apisix/discovery/dns/#service-discovery-via-dns
    # https://apisix.apache.org/docs/apisix/discovery/consul_kv/#configuration-for-consul-kv
    #
    # an eureka example:
    # ```
    # eureka:
    #   host:
    #     - "http://${username}:${password}@${eureka_host1}:${eureka_port1}"
    #     - "http://${username}:${password}@${eureka_host2}:${eureka_port2}"
    #   prefix: "/eureka/"
    #   fetch_interval: 30
    #   weight: 100
    #   timeout:
    #     connect: 2000
    #     send: 2000
    #     read: 5000
    # ```

# access log and error log configuration
logs:
  # -- Enable access log or not, default true
  enableAccessLog: true
  # -- Access log path
  accessLog: "/dev/stdout"
  # -- Access log format
  accessLogFormat: '$remote_addr - $remote_user [$time_local] $http_host \"$request\" $status $body_bytes_sent $request_time \"$http_referer\" \"$http_user_agent\" $upstream_addr $upstream_status $upstream_response_time \"$upstream_scheme://$upstream_host$upstream_uri\"'
  # -- Allows setting json or default characters escaping in variables
  accessLogFormatEscape: default
  # -- Error log path
  errorLog: "/dev/stderr"
  # -- Error log level, Allowed values: `debug`, `info`, `notice`, `warn`, `error`, `crit`, `alert`, `or` `emerg`
  errorLogLevel: "warn"
  # -- Stream access log and error log configuration
  stream:
    # -- Enable stream access log or not, default false
    enableAccessLog: false
    # -- Stream access log path
    accessLog: "logs/access_stream.log"
    # -- Stream access log format
    accessLogFormat: '$remote_addr [$time_local] $protocol $status $bytes_sent $bytes_received $session_time'
    # -- Allows setting json or default characters escaping in variables for stream
    accessLogFormatEscape: default

dns:
  # -- Nameservers used by the gateway to resolve upstream domain names.
  # When empty (default), nameservers are read from `/etc/resolv.conf`,
  # which is usually what you want inside Kubernetes
  resolvers: []
    # - 127.0.0.1
    # - 8.8.8.8
  # -- Override the TTL in seconds of valid DNS records
  validity: 30
  # -- DNS resolver timeout in seconds
  timeout: 5
  # -- Honor the `search` option in `/etc/resolv.conf` when resolving domain names
  enableResolvSearchOpt: true

initContainer:
  # -- Init container image
  image: busybox
  # -- Init container tag
  tag: 1.28

autoscaling:
  # -- Enable HorizontalPodAutoscaler for the gateway (only when apisix.kind is Deployment)
  enabled: false
  # -- HPA version, the value is "v2" or "v2beta1", default "v2"
  version: v2
  # -- Minimum number of gateway replicas
  minReplicas: 1
  # -- Maximum number of gateway replicas
  maxReplicas: 100
  # -- Target average CPU utilization percentage that triggers scaling
  targetCPUUtilizationPercentage: 80
  # -- Target average memory utilization percentage that triggers scaling
  targetMemoryUtilizationPercentage: 80

# -- Custom nginx configuration snippets injected into the generated nginx.conf.
# As arbitrary configuration can be added here, it is your responsibility to make sure
# the snippets don't conflict with the configuration generated by the gateway.
configurationSnippet:
  # -- Snippet added to the nginx `main` (top-level) block
  main: |

  # -- Snippet added to the beginning of the nginx `http` block
  httpStart: |

  # -- Snippet added to the end of the nginx `http` block
  httpEnd: |

  # -- Snippet added to the nginx `server` block that proxies regular traffic
  httpSrv: |

  # -- Snippet added to the `location` block of the nginx `server` block that proxies regular traffic
  httpSrvLocation: |

  # -- Snippet added to the nginx `server` block that serves the Admin API
  httpAdmin: |

  # -- Snippet added to the nginx `stream` block
  stream: |

# -- Observability configuration.
# ref: https://apisix.apache.org/docs/apisix/plugins/prometheus/
serviceMonitor:
  # -- Enable or disable API7 Gateway serviceMonitor
  enabled: false
  # -- namespace where the serviceMonitor is deployed, by default, it is the same as the namespace of the apisix
  namespace: ""
  # -- name of the serviceMonitor, by default, it is the same as the apisix fullname
  name: ""
  # -- interval at which metrics should be scraped
  interval: 15s
  # -- path of the metrics endpoint
  path: /apisix/prometheus/metrics
  # -- prefix of the metrics
  metricPrefix: apisix_
  # -- container port where the metrics are exposed
  containerPort: 9091
  # -- (int) The nodePort of kubernetes service, only used if gateway.type is NodePort. If not set, a random port will be assigned by Kubernetes.
  nodePort:
  # -- @param serviceMonitor.labels ServiceMonitor extra labels
  labels: {}
  # -- @param serviceMonitor.annotations ServiceMonitor annotations
  annotations: {}

# -- etcd configuration
# use the FQDN address or the IP of the etcd
etcd:
  # -- install etcd(v3) by default, set false if do not want to install etcd(v3) together
  enabled: false
  image:
    # -- etcd image repository, only used when etcd.enabled is true
    repository: api7/etcd
  # -- if etcd.enabled is false, use external etcd, support multiple address, if your etcd cluster enables TLS, please use https scheme, e.g. https://127.0.0.1:2379.
  host:
    # host or ip e.g. http://172.20.128.89:2379
    - http://etcd.host:2379
  # -- if etcd.enabled is false, username for external etcd. If etcd.enabled is true, use etcd.auth.rbac.rootPassword instead.
  user: ""
  # -- if etcd.enabled is false, password for external etcd. If etcd.enabled is true, use etcd.auth.rbac.rootPassword instead.
  password: ""
  # -- apisix configurations prefix
  prefix: "/apisix"
  # -- Set the timeout value in seconds for subsequent socket operations from apisix to etcd cluster
  timeout: 30
  # -- Set the timeout value in seconds for watching etcd
  watchTimeout: 50
  # -- The number of retries to etcd during startup
  startupRetry: 2

  # -- if etcd.enabled is true, set more values of bitnami/etcd helm chart
  auth:
    rbac:
      # -- No authentication by default. Switch to enable RBAC authentication
      create: false
      # -- root password for etcd. Requires etcd.auth.rbac.create to be true.
      rootPassword: ""
    tls:
      # -- enable etcd client certificate
      enabled: false
      # -- name of the secret contains etcd client cert
      existingSecret: ""
      # -- etcd client cert filename using in etcd.auth.tls.existingSecret
      certFilename: ""
      # -- etcd client cert key filename using in etcd.auth.tls.existingSecret
      certKeyFilename: ""
      # -- whether to verify the etcd endpoint certificate when setup a TLS connection to etcd
      verify: false
      # -- specify the TLS Server Name Indication extension, the ETCD endpoint hostname will be used when this setting is unset.
      sni: ""

  service:
    # -- etcd client service port
    port: 2379

  # -- Number of etcd replicas, only used when etcd.enabled is true
  replicaCount: 3

vault:
  # -- Enable or disable the vault integration
  enabled: false
  # -- The host address where the vault server is running.
  host: ""
  # -- HTTP timeout for each request.
  timeout: 10
  # -- The generated token from vault instance that can grant access to read data from the vault.
  token: ""
  # -- Prefix allows you to better enforcement of policies.
  prefix: ""

soapProxy:
  # -- Enable or disable the SOAP proxy, this component is disabled by default,
  # when use soap-proxy plugin in API7, you need to enable this component.
  enabled: false
  image:
    # -- SOAP proxy image repository
    repository: api7/soap-proxy
    # -- SOAP proxy image tag
    tag: 1.0.0
    # -- SOAP proxy image pull policy
    pullPolicy: IfNotPresent

openapiToMcp:
  # -- Enable or disable the OpenAPI-to-MCP sidecar. Required when using the
  # `openapi-to-mcp` or `mcp-tools-acl` plugins. The container runs alongside
  # the gateway in the same pod and is reached on 127.0.0.1.
  enabled: false
  image:
    # -- OpenAPI-to-MCP image repository
    repository: api7/openapi-to-mcp
    # -- OpenAPI-to-MCP image tag
    tag: 1.0.2
    # -- OpenAPI-to-MCP image pull policy
    pullPolicy: IfNotPresent
  # -- Port that the sidecar listens on. Must match the `port` configured under
  # `plugin_attr.openapi-to-mcp` in the gateway config (defaults to 3000).
  port: 3000
  # -- Resources for the OpenAPI-to-MCP sidecar container.
  resources: {}

control:
  # -- Enable Control API
  enabled: true
  # -- which ip to listen on for Control API
  ip: "127.0.0.1"
  # -- which port to use for Control API
  port: 9090
