{{- if .Values.apisix.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "apisix.fullname" . }}
  namespace: {{ .Release.Namespace }}
data:
  config.yaml: |-
    {{- if .Values.apisix.enableCustomizedConfig }}
    {{- range $key, $value := .Values.apisix.customizedConfig }}
    {{ $key }}:
      {{- include "apisix.tplvalues.render" (dict "value" $value "context" $) | nindent 6 }}
    {{- end }}
    {{- else }}
    {{- if .Values.api7ee }}
    api7ee:
      {{- toYaml .Values.api7ee | nindent 6 }}
    {{- end }}
    apisix:    # universal configurations
      node_listen:    # APISIX listening port
        - ip: {{ .Values.gateway.http.ip }}
          port: {{ .Values.gateway.http.containerPort }}
          {{- if hasKey .Values.gateway.http "backlog" }}
          backlog: {{ .Values.gateway.http.backlog }}
          {{- end }}
        {{- with .Values.gateway.http.additionalContainerPorts }}
        {{- toYaml . | nindent 8}}
        {{- end }}
      enable_heartbeat: true
      enable_admin: {{ .Values.admin.enabled }}
      enable_admin_cors: {{ .Values.admin.cors }}
      enable_debug: false
      {{- if .Values.apisix.extraLuaPath }}
      extra_lua_path: "{{ .Values.apisix.extraLuaPath }};"
      {{- end }}
      {{- if .Values.apisix.extraLuaCPath }}
      extra_lua_cpath: "{{ .Values.apisix.extraLuaCPath }};"
      {{- end }}

      enable_dev_mode: false                       # Sets nginx worker_processes to 1 if set to true
      enable_reuseport: true                       # Enable nginx SO_REUSEPORT switch if set to true.
      enable_ipv6: {{ .Values.apisix.enableIPv6 }} # Enable nginx IPv6 resolver
      enable_server_tokens: {{ .Values.apisix.enableServerTokens }} # Whether the APISIX version number should be shown in Server header
      show_upstream_status_in_response_header: {{ .Values.apisix.showUpstreamStatusInResponseHeader }} # when true all upstream status write to `X-APISIX-Upstream-Status` otherwise only 5xx code

      {{- with .Values.apisix.trustedAddresses }}
      trusted_addresses:    # When configured, APISIX will trust the `X-Forwarded-*` Headers passed in requests from the IP/CIDR in the list.
        {{- toYaml . | nindent 8 }}
      {{- end }}

      max_post_args_readable_size: {{ .Values.apisix.maxPostArgsReadableSize }} # Cap (in MB) on the request body read when matching `post_arg.*` route predicates

      {{- if or .Values.apisix.proxyProtocol.enableTcpPP .Values.apisix.proxyProtocol.enableTcpPPToUpstream .Values.apisix.proxyProtocol.listenHttpPort .Values.apisix.proxyProtocol.listenHttpsPort }}
      proxy_protocol:
        {{- if .Values.apisix.proxyProtocol.listenHttpPort }}
        listen_http_port: {{ .Values.apisix.proxyProtocol.listenHttpPort }}
        {{- end }}
        {{- if .Values.apisix.proxyProtocol.listenHttpsPort }}
        listen_https_port: {{ .Values.apisix.proxyProtocol.listenHttpsPort }}
        {{- end }}
        enable_tcp_pp: {{ .Values.apisix.proxyProtocol.enableTcpPP }}
        enable_tcp_pp_to_upstream: {{ .Values.apisix.proxyProtocol.enableTcpPPToUpstream }}
      {{- end }}

      proxy_cache:                         # Proxy Caching configuration
        cache_ttl: {{ .Values.apisix.proxyCache.cacheTtl }} # The default caching time if the upstream does not specify the cache time
        zones:                             # The parameters of a cache
          {{- toYaml .Values.apisix.proxyCache.zones | nindent 10 }}

      delete_uri_tail_slash: {{ .Values.apisix.deleteURITailSlash }}    # delete the '/' at the end of the URI
      # The URI normalization in servlet is a little different from the RFC's.
      # See https://github.com/jakartaee/servlet/blob/master/spec/src/main/asciidoc/servlet-spec-body.adoc#352-uri-path-canonicalization,
      # which is used under Tomcat.
      # Turn this option on if you want to be compatible with servlet when matching URI path.
      normalize_uri_like_servlet: {{ .Values.apisix.normalizeURILikeServlet }}
      router:
        http: {{ .Values.apisix.httpRouter }}  # radixtree_uri: match route by uri(base on radixtree)
                                    # radixtree_host_uri: match route by host + uri(base on radixtree)
                                    # radixtree_uri_with_parameter: match route by uri with parameters
        ssl: 'radixtree_sni'        # radixtree_sni: match route by SNI(base on radixtree)

      {{- if and .Values.gateway.stream.enabled (or (gt (len .Values.gateway.stream.tcp) 0) (gt (len .Values.gateway.stream.udp) 0)) }}
      stream_proxy:                 # TCP/UDP proxy
        only: {{ .Values.gateway.stream.only }}
        {{- if gt (len .Values.gateway.stream.tcp) 0 }}
        tcp:                        # TCP proxy port list
          {{- range .Values.gateway.stream.tcp }}
          {{- if kindIs "map" . }}
          - addr: {{ .addr | quote }}
          {{- if hasKey . "tls" }}
            tls: {{ .tls }}
          {{- end }}
          {{- if hasKey . "proxy_protocol" }}
            proxy_protocol: {{ .proxy_protocol }}
          {{- end }}
          {{- if hasKey . "proxy_protocol_to_upstream" }}
            proxy_protocol_to_upstream: {{ .proxy_protocol_to_upstream }}
          {{- end }}
          {{- else if kindIs "string" . }}
          - {{ . | quote }}
          {{- else }}
          - {{ . }}
          {{- end }}
          {{- end }}
        {{- end }}
        {{- if gt (len .Values.gateway.stream.udp) 0 }}
        udp:                        # UDP proxy port list
          {{- range .Values.gateway.stream.udp }}
          {{- if kindIs "map" . }}
          - addr: {{ .addr | quote }}
          {{- else if kindIs "string" . }}
          - {{ . | quote }}
          {{- else }}
          - {{ . }}
          {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.dns.resolvers }}
      dns_resolver:    # If not set, read from `/etc/resolv.conf`
        {{- range $resolver := . }}
        - {{ $resolver }}
        {{- end }}
      {{- end }}
      dns_resolver_valid: {{.Values.dns.validity}}
      resolver_timeout: {{.Values.dns.timeout}}
      enable_resolv_search_opt: {{ .Values.dns.enableResolvSearchOpt }}
      ssl:
        enable: {{ .Values.gateway.tls.enabled }}
        listen:
          - ip: {{ .Values.gateway.tls.ip }}
            port: {{ .Values.gateway.tls.containerPort }}
            {{- if hasKey .Values.gateway.tls "backlog" }}
            backlog: {{ .Values.gateway.tls.backlog }}
            {{- end }}
            enable_http2: {{ .Values.gateway.tls.http2.enabled }}
          {{- with .Values.gateway.tls.additionalContainerPorts }}
          {{- toYaml . | nindent 10}}
          {{- end }}
        ssl_protocols: {{ .Values.gateway.tls.sslProtocols | quote }}
        ssl_ciphers: {{ .Values.gateway.tls.sslCiphers | quote }}
        ssl_session_tickets: {{ .Values.gateway.tls.sslSessionTickets }}
        {{- if and .Values.gateway.tls.enabled .Values.gateway.tls.existingCASecret }}
        ssl_trusted_certificate: "system,/usr/local/apisix/conf/ssl/{{ .Values.gateway.tls.certCAFilename }}"
        {{- end }}
      {{- if .Values.gateway.tls.fallbackSNI }}
        fallback_sni: {{ .Values.gateway.tls.fallbackSNI }}
      {{- end }}

      {{- if .Values.api7ee.status_endpoint.enabled }}
      status:
        ip: {{ .Values.api7ee.status_endpoint.ip }}
        port: {{ .Values.api7ee.status_endpoint.port }}
      {{- end }}

      enable_control: {{ .Values.control.enabled }}
      {{- if .Values.control.enabled }}
      control:
        ip: {{ default "127.0.0.1" .Values.control.ip }}
        port: {{ default 9090 .Values.control.port }}
      {{- end }}

      disable_upstream_healthcheck: {{ .Values.api7ee.disable_upstream_healthcheck }}

      # fine tune the parameters of LRU cache for some features like secret
      lru:
        secret:
          ttl: {{ .Values.apisix.lru.secret.ttl }} # seconds
          count: {{ .Values.apisix.lru.secret.count }}
          neg_ttl: {{ .Values.apisix.lru.secret.neg_ttl }}
          neg_count: {{ .Values.apisix.lru.secret.neg_count }}

      tracing: {{ .Values.apisix.tracing }}

    nginx_config:    # config for render the template to genarate nginx.conf
      error_log: "{{ .Values.logs.errorLog }}"
      error_log_level: "{{ .Values.logs.errorLogLevel }}"    # warn,error
      worker_processes: "{{ .Values.nginx.workerProcesses }}"
      enable_cpu_affinity: {{ and true .Values.nginx.enableCPUAffinity }}
      worker_rlimit_nofile: {{ default "20480" .Values.nginx.workerRlimitNofile }}  # the number of files a worker process can open, should be larger than worker_connections
      worker_shutdown_timeout: "{{ .Values.nginx.workerShutdownTimeout }}"
      max_pending_timers: {{ default "16384" .Values.nginx.maxPendingTimers }}   # increase it if you see "too many pending timers" error
      max_running_timers: {{ default "4096" .Values.nginx.maxRunningTimers }}    # increase it if you see "lua_max_running_timers are not enough" error
      event:
        worker_connections: {{ default "10620" .Values.nginx.workerConnections  }}
      {{- with .Values.nginx.envs }}
      envs:
      {{- range $env := . }}
        - {{ $env }}
      {{- end }}
      {{- end }}

      {{- if .Values.apisix.meta.luaSharedDict }}
      meta:
        lua_shared_dict:
          {{- toYaml .Values.apisix.meta.luaSharedDict | nindent 10 }}
      {{- end }}

      stream:
        {{- if .Values.apisix.stream.luaSharedDict }}
        lua_shared_dict:
          {{- toYaml .Values.apisix.stream.luaSharedDict | nindent 10 }}
        {{- end }}
        {{- if and (.Values.deployment.fallback_cp) (eq .Values.deployment.fallback_cp.mode "write") }}
        enable_access_log: false
        {{- else }}
        enable_access_log: {{ .Values.logs.stream.enableAccessLog }}
        {{- end }}
        {{- if .Values.logs.stream.enableAccessLog }}
        access_log: "{{ .Values.logs.stream.accessLog }}"
        access_log_format: >-
          {{- .Values.logs.stream.accessLogFormat | nindent 10 }}
        access_log_format_escape: {{ .Values.logs.stream.accessLogFormatEscape }}
        {{- end }}
      http:
        {{- if and (.Values.deployment.fallback_cp) (eq .Values.deployment.fallback_cp.mode "write") }}
        enable_access_log: false
        {{- else }}
        enable_access_log: {{ .Values.logs.enableAccessLog }}
        {{- end }}
        {{- if .Values.logs.enableAccessLog }}
        access_log: "{{ .Values.logs.accessLog }}"
        access_log_format: >-
          {{- .Values.logs.accessLogFormat | nindent 10 }}
        access_log_format_escape: {{ .Values.logs.accessLogFormatEscape }}
        {{- end }}
        keepalive_timeout: {{ .Values.nginx.http.keepaliveTimeout }}         # timeout during which a keep-alive client connection will stay open on the server side.
        client_header_timeout: {{ .Values.nginx.http.clientHeaderTimeout }}     # timeout for reading client request header, then 408 (Request Time-out) error is returned to the client
        client_body_timeout: {{ .Values.nginx.http.clientBodyTimeout }}     # timeout for reading client request body, then 408 (Request Time-out) error is returned to the client
        send_timeout: {{ .Values.nginx.http.sendTimeout }}              # timeout for transmitting a response to the client.then the connection is closed
        client_max_body_size: {{ .Values.nginx.http.clientMaxBodySize }}        # The maximum allowed size of the client request body.
                                       # If exceeded, the 413 (Request Entity Too Large) error is returned to the client.
                                       # Note that unlike Nginx, we don't limit the body size by default.
        underscores_in_headers: {{ .Values.nginx.http.underscoresInHeaders | quote }}   # default enables the use of underscores in client request header fields
        real_ip_header: {{ .Values.nginx.http.realIpHeader | quote }}    # http://nginx.org/en/docs/http/ngx_http_realip_module.html#real_ip_header
        real_ip_recursive: {{ .Values.nginx.http.realIpRecursive | quote }}    # http://nginx.org/en/docs/http/ngx_http_realip_module.html#real_ip_recursive
        real_ip_from:                  # http://nginx.org/en/docs/http/ngx_http_realip_module.html#set_real_ip_from
          {{- range $ip := .Values.nginx.http.realIpFrom }}
          - {{ $ip | quote }}
          {{- end }}
        proxy_ssl_server_name: {{ .Values.nginx.http.proxySslServerName }}  # send the server name (SNI) when establishing a TLS connection with the proxied HTTPS upstream
        upstream:
          keepalive: {{ .Values.nginx.http.upstream.keepalive }}                     # The maximum number of idle keepalive connections to upstream servers per worker process
          keepalive_requests: {{ .Values.nginx.http.upstream.keepaliveRequests }}    # The maximum number of requests that can be served through one keepalive connection
          keepalive_timeout: {{ .Values.nginx.http.upstream.keepaliveTimeout }}      # Timeout during which an idle keepalive connection to an upstream server will stay open
        charset: {{ .Values.nginx.http.charset }}    # Adds the specified charset to the "Content-Type" response header field
        variables_hash_max_size: {{ .Values.nginx.http.variablesHashMaxSize }}    # Sets the maximum size of the variables hash table
        {{- if .Values.apisix.customLuaSharedDicts }}
        custom_lua_shared_dict:        # add custom shared cache to nginx.conf
        {{- range $dict := .Values.apisix.customLuaSharedDicts }}
          {{ $dict.name }}: {{ $dict.size }}
        {{- end }}
        {{- end }}
        {{- if .Values.apisix.http.luaSharedDict }}
        lua_shared_dict:
          {{- toYaml .Values.apisix.http.luaSharedDict | nindent 10 }}
        {{- end }}
      {{- if .Values.configurationSnippet.main }}
      main_configuration_snippet: {{- toYaml .Values.configurationSnippet.main | indent 6 }}
      {{- end }}
      {{- if .Values.configurationSnippet.httpStart }}
      http_configuration_snippet: {{- toYaml .Values.configurationSnippet.httpStart | indent 6 }}
      {{- end }}
      {{- if .Values.configurationSnippet.httpEnd }}
      http_end_configuration_snippet: {{- toYaml .Values.configurationSnippet.httpEnd | indent 6 }}
      {{- end }}
      {{- if .Values.configurationSnippet.httpSrv }}
      http_server_configuration_snippet: {{- toYaml .Values.configurationSnippet.httpSrv | indent 6 }}
      {{- end }}
      {{- if .Values.configurationSnippet.httpSrvLocation }}
      http_server_location_configuration_snippet: {{- toYaml .Values.configurationSnippet.httpSrvLocation | indent 6 }}
      {{- end }}
      {{- if .Values.configurationSnippet.httpAdmin }}
      http_admin_configuration_snippet: {{ toYaml .Values.configurationSnippet.httpAdmin | indent 6 }}
      {{- end }}
      {{- if .Values.configurationSnippet.stream }}
      stream_configuration_snippet: {{- toYaml .Values.configurationSnippet.stream | indent 6 }}
      {{- end }}

    graphql:
      max_size: {{ int .Values.graphql.maxSize }}    # the maximum size limitation of graphql in bytes

    {{- if .Values.discovery.enabled }}
    discovery:
      {{- range $key, $value := .Values.discovery.registry }}
      {{- if $value }}
      {{ $key }}:
        {{- include "apisix.tplvalues.render" (dict "value" $value "context" $) | nindent 8 }}
      {{- else }}
      {{ $key }}: {}
      {{- end }}
      {{- end }}
    {{- end }}

    {{- if .Values.vault.enabled }}
    vault:
      host: {{ .Values.vault.host }}
      timeout: {{ .Values.vault.timeout }}
      token: {{ .Values.vault.token }}
      prefix: {{ .Values.vault.prefix }}
    {{- end }}

    {{- if or .Values.pluginAttrs .Values.serviceMonitor.enabled}}
    {{- $pluginAttrs := include "apisix.pluginAttrs" . -}}
    {{- if gt (len ($pluginAttrs | fromYaml)) 0 }}
    plugin_attr: {{- $pluginAttrs | nindent 6 }}
    {{- end }}
    {{- end }}

    deployment:
      {{- if and (.Values.deployment.fallback_cp) }}
      fallback_cp:
        {{- toYaml .Values.deployment.fallback_cp | nindent 8 }}
      {{- end }}
      {{- if and (.Values.deployment.fallback_cp) (ne .Values.deployment.fallback_cp.mode "write") }}
      role: data_plane
      role_data_plane:
        config_provider: json
      {{- else }}
      role: traditional
      role_traditional:
        config_provider: etcd

      admin:
        allow_admin:    # http://nginx.org/en/docs/http/ngx_http_access_module.html#allow
        {{- if .Values.admin.allow.ipList }}
        {{- range $ips := .Values.admin.allow.ipList }}
          - {{ $ips }}
        {{- end }}
        {{- else }}
          - 0.0.0.0/0
        {{- end}}
        #   - "::/64"
        {{- if .Values.admin.enabled }}
        admin_listen:
          ip: {{ .Values.admin.ip }}
          port: {{ .Values.admin.port }}
        {{- end }}
        # Default token when use API to call for Admin API.
        # *NOTE*: Highly recommended to modify this value to protect APISIX's Admin API.
        # Disabling this configuration item means that the Admin API does not
        # require any authentication.
        admin_key:
          # admin: can everything for configuration data
          - name: "admin"
            {{- if .Values.admin.credentials.secretName }}
            key: "{{"{{"}}APISIX_ADMIN_KEY{{"}}"}}"
            {{- else }}
            key: {{ .Values.admin.credentials.admin }}
            {{- end }}
            role: admin
          # viewer: only can view configuration data
          - name: "viewer"
            {{- if .Values.admin.credentials.secretName }}
            key: "{{"{{"}}APISIX_VIEWER_KEY{{"}}"}}"
            {{- else }}
            key: {{ .Values.admin.credentials.viewer }}
            {{- end }}
            role: viewer
      etcd:
      {{- if .Values.etcd.enabled }}
        host:                          # it's possible to define multiple etcd hosts addresses of the same etcd cluster.
          {{- if .Values.etcd.fullnameOverride }}
          - "{{ include "apisix.etcd.auth.scheme" . }}://{{ .Values.etcd.fullnameOverride }}:{{ .Values.etcd.service.port }}"
          {{- else }}
          - "{{ include "apisix.etcd.auth.scheme" . }}://{{ .Release.Name }}-etcd.{{ .Release.Namespace }}.svc.{{ .Values.etcd.clusterDomain }}:{{ .Values.etcd.service.port }}"
          {{- end}}
      {{- else }}
        host:                          # it's possible to define multiple etcd hosts addresses of the same etcd cluster.
          {{- range $value := .Values.etcd.host }}
          - "{{ $value }}"             # multiple etcd address
          {{- end}}
      {{- end }}
        prefix: {{ .Values.etcd.prefix | quote }}    # configuration prefix in etcd
        timeout: {{ .Values.etcd.timeout }}    # The timeout in seconds when connect/read/write to etcd
        watch_timeout: {{ .Values.etcd.watchTimeout }}    # The timeout in seconds when watch etcd
        startup_retry: {{ .Values.etcd.startupRetry }}    # the number of retry to etcd during the startup
        {{- if and (not .Values.etcd.enabled) .Values.etcd.user }}
        user: {{ .Values.etcd.user | quote }}
        password: {{ .Values.etcd.password | quote }}
        {{- else if and .Values.etcd.enabled .Values.etcd.auth.rbac.create }}
        user: "root"
        password: {{ .Values.etcd.auth.rbac.rootPassword | quote }}
        {{- end }}
        {{- if .Values.etcd.auth.tls.enabled }}
        tls:
          cert: "/etcd-ssl/{{ .Values.etcd.auth.tls.certFilename }}"
          key: "/etcd-ssl/{{ .Values.etcd.auth.tls.certKeyFilename }}"
          verify: {{ .Values.etcd.auth.tls.verify }}
          {{- if ne .Values.etcd.auth.tls.sni "" }}
          sni: "{{ .Values.etcd.auth.tls.sni }}"
          {{- end }}
        {{- else }}
        tls:
          verify: {{ .Values.etcd.auth.tls.verify }}
          {{- if ne .Values.etcd.auth.tls.sni "" }}
          sni: "{{ .Values.etcd.auth.tls.sni }}"
          {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
{{- end }}
