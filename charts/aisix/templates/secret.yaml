{{- if not .Values.deployment.admin.existingSecret }}
{{- if not .Values.deployment.admin.adminKey }}
{{- fail "deployment.admin.adminKey is required when deployment.admin.existingSecret is not set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aisix.fullname" . }}-admin-key
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aisix.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-key: {{ .Values.deployment.admin.adminKey | quote }}
{{- end }}
