apiVersion: v1
kind: Service
metadata:
  name: {{ include "aisix-cp.fullname" . }}-dpm
  labels:
    {{- include "aisix-cp.labels" . | nindent 4 }}
    {{- include "aisix-cp.selectorLabels" (dict "root" . "component" "dpm") | nindent 4 }}
spec:
  type: {{ .Values.dpm.service.type }}
  ports:
    - port: {{ .Values.dpm.service.port }}
      targetPort: tls
      protocol: TCP
      name: tls
      {{- if and (eq .Values.dpm.service.type "NodePort") .Values.dpm.service.nodePort }}
      nodePort: {{ .Values.dpm.service.nodePort }}
      {{- end }}
  selector:
    {{- include "aisix-cp.selectorLabels" (dict "root" . "component" "dpm") | nindent 4 }}
