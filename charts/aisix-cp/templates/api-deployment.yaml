apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aisix-cp.fullname" . }}-api
  labels:
    {{- include "aisix-cp.labels" . | nindent 4 }}
    {{- include "aisix-cp.selectorLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "aisix-cp.selectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aisix-cp.labels" . | nindent 8 }}
        {{- include "aisix-cp.selectorLabels" (dict "root" . "component" "api") | nindent 8 }}
    spec:
      {{- include "aisix-cp.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "aisix-cp.serviceAccountName" . }}
      {{- with .Values.api.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "aisix-cp.pgWaitInitContainer" . | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          {{- with .Values.api.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aisix-cp.pgSecretName" . }}
                  key: {{ include "aisix-cp.pgPasswordSecretKey" . }}
            {{- if .Values.twoDSN.enabled }}
            - name: SERVING_PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aisix-cp.servingPasswordSecretName" . }}
                  key: {{ include "aisix-cp.servingPasswordSecretKey" . }}
            {{- end }}
            - name: AISIX_CLOUD_LISTEN
              value: ":8080"
            {{- if .Values.twoDSN.enabled }}
            - name: AISIX_CLOUD_ADMIN_DATABASE_URL
              value: {{ include "aisix-cp.databaseURL" . }}
            - name: AISIX_CLOUD_DATABASE_URL
              value: {{ include "aisix-cp.servingDatabaseURL" . }}
            {{- else }}
            - name: AISIX_CLOUD_DATABASE_URL
              value: {{ include "aisix-cp.databaseURL" . }}
            {{- end }}
            - name: AISIX_CLOUD_PUBLIC_BASE_URL
              value: {{ .Values.api.publicBaseURL | quote }}
            - name: AISIX_CLOUD_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "aisix-cp.secretName" . }}
                  key: master-key
            - name: AISIX_CLOUD_MASTER_KEY_ID
              value: {{ .Values.secrets.masterKeyID | quote }}
            - name: AISIX_CLOUD_DASHBOARD_URL
              value: "http://{{ include "aisix-cp.fullname" . }}-ui:{{ .Values.ui.service.port }}"
            {{- if .Values.api.dpmgrBaseURL }}
            - name: AISIX_CLOUD_DPMGR_BASE_URL
              value: {{ .Values.api.dpmgrBaseURL | quote }}
            {{- end }}
            - name: AISIX_CLOUD_OAUTH_ENABLED
              value: {{ .Values.api.oauthEnabled | quote }}
            - name: AISIX_CLOUD_DP_IMAGE
              value: {{ .Values.api.dpImage | default (printf "docker.io/api7/aisix:%s" .Chart.AppVersion) | quote }}
            {{- with .Values.api.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
