apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aisix-cp.fullname" . }}-dpm
  labels:
    {{- include "aisix-cp.labels" . | nindent 4 }}
    {{- include "aisix-cp.selectorLabels" (dict "root" . "component" "dpm") | nindent 4 }}
spec:
  replicas: {{ .Values.dpm.replicaCount }}
  selector:
    matchLabels:
      {{- include "aisix-cp.selectorLabels" (dict "root" . "component" "dpm") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aisix-cp.labels" . | nindent 8 }}
        {{- include "aisix-cp.selectorLabels" (dict "root" . "component" "dpm") | nindent 8 }}
    spec:
      {{- include "aisix-cp.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "aisix-cp.serviceAccountName" . }}
      {{- with .Values.dpm.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "aisix-cp.pgWaitInitContainer" . | nindent 8 }}
      containers:
        - name: dpm
          image: "{{ .Values.dpm.image.repository }}:{{ .Values.dpm.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.dpm.image.pullPolicy }}
          {{- with .Values.dpm.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: tls
              containerPort: 7944
              protocol: TCP
            {{- if .Values.dpm.service.healthListen }}
            - name: health
              containerPort: {{ trimPrefix ":" .Values.dpm.service.healthListen | int }}
              protocol: TCP
            {{- end }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aisix-cp.pgSecretName" . }}
                  key: {{ include "aisix-cp.pgPasswordSecretKey" . }}
            - name: AISIX_DPMGR_LISTEN
              value: ":7944"
            - name: AISIX_DPMGR_HEALTH_LISTEN
              value: {{ .Values.dpm.service.healthListen | quote }}
            - name: AISIX_DPMGR_DATABASE_URL
              value: {{ include "aisix-cp.databaseURL" . }}
            - name: AISIX_DPMGR_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "aisix-cp.secretName" . }}
                  key: master-key
            - name: AISIX_DPMGR_MASTER_KEY_ID
              value: {{ .Values.secrets.masterKeyID | quote }}
            {{- with .Values.dpm.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # Probe the plain-HTTP /healthz (poller liveness), not the
          # mTLS port: a kubelet cannot present a client cert, and a
          # TCP check on 7944 stays green even if the outbox poller is
          # dead/wedged. A stale poller fails readiness (removed from the
          # Service) and liveness (pod restarted). When the health
          # listener is disabled (healthListen=""), the dp-manager serves
          # no /healthz, so fall back to a TCP check on the mTLS port.
          {{- if .Values.dpm.service.healthListen }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          {{- else }}
          readinessProbe:
            tcpSocket:
              port: tls
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: tls
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- end }}
          {{- with .Values.dpm.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.dpm.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dpm.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dpm.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
