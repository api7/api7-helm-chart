{{/*
Secrets rendered from explicit values. No auto-generation — values must
be set explicitly to guarantee stability across re-deploys where helm
lookup is unavailable during server-side rendering (ArgoCD, Flux, etc.).
*/}}
{{- if or (eq .Values.secrets.masterKey "") (hasPrefix "CHANGE_ME" .Values.secrets.masterKey) }}
  {{- fail "secrets.masterKey must be set to a real base64-encoded 32-byte key (generate with: openssl rand -base64 32)" }}
{{- end }}
{{- if or (eq .Values.secrets.betterAuthSecret "") (hasPrefix "CHANGE_ME" .Values.secrets.betterAuthSecret) }}
  {{- fail "secrets.betterAuthSecret must be set to a real secret (generate with: openssl rand -base64 48)" }}
{{- end }}
{{/*
Hold builtin PostgreSQL credentials to the same standard as the
application secrets above: reject the documented placeholder so an
operator can't deploy a cluster-reachable database with a known
password. Skipped when an existingSecret injects the credentials.
*/}}
{{- if and .Values.postgresql.builtin (not .Values.postgresql.auth.existingSecret) }}
  {{- range $field := list "password" "postgresPassword" }}
    {{- $val := get $.Values.postgresql.auth $field | toString }}
    {{- if or (eq $val "") (eq (lower $val) "changeme") (hasPrefix "CHANGE_ME" $val) }}
      {{- fail (printf "postgresql.auth.%s must be set to a real password when postgresql.builtin=true (the default 'changeme' is rejected). Generate one with: openssl rand -base64 24 — or inject credentials via postgresql.auth.existingSecret." $field) }}
    {{- end }}
  {{- end }}
{{- end }}
{{/*
Two-DSN serving-role password: when chart-managed (no existingSecret),
hold it to the same standard as the app secrets above so cp_api_app can't
be provisioned with an empty/placeholder login.
*/}}
{{- if and .Values.twoDSN.enabled (not .Values.twoDSN.existingSecret) }}
  {{- if or (eq .Values.twoDSN.servingPassword "") (hasPrefix "CHANGE_ME" .Values.twoDSN.servingPassword) }}
    {{- fail "twoDSN.servingPassword must be set to a real password when twoDSN.enabled=true (generate a URL-safe one with: openssl rand -hex 24) — or inject it via twoDSN.existingSecret." }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aisix-cp.secretName" . }}
  labels:
    {{- include "aisix-cp.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  master-key: {{ .Values.secrets.masterKey | b64enc }}
  better-auth-secret: {{ .Values.secrets.betterAuthSecret | b64enc }}
  {{- if and .Values.twoDSN.enabled (not .Values.twoDSN.existingSecret) }}
  serving-password: {{ .Values.twoDSN.servingPassword | b64enc }}
  {{- end }}
